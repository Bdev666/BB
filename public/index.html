<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏢 Multi-Agent AI Office</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">🏢</div>
        <div class="logo-text">
          <h1>AI Office</h1>
          <p>Multi-Agent System</p>
        </div>
      </div>
      <nav class="agent-list" id="agentList">
        <div class="loading-agents">กำลังโหลด...</div>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-clear" id="clearBtn">🗑️ ล้างประวัติ</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="chat-header">
        <div class="agent-info">
          <span class="agent-emoji" id="headerEmoji">🏢</span>
          <div>
            <h2 id="headerName">เลือกผู้ช่วย AI</h2>
            <p id="headerTitle">เลือกผู้ช่วยจากเมนูด้านซ้าย</p>
          </div>
        </div>
        <span class="model-badge">Claude Opus 4.6</span>
      </header>

      <div class="chat-area" id="chatArea">
        <div class="welcome-screen" id="welcomeScreen">
          <div class="welcome-icon">🏢</div>
          <h2>ยินดีต้อนรับสู่ AI Office</h2>
          <p>ระบบผู้ช่วย AI หลายตัว สำหรับงานสำนักงานทุกด้าน</p>
          <div class="welcome-agents" id="welcomeAgents"></div>
        </div>
        <div class="messages" id="messages" style="display:none"></div>
      </div>

      <!-- Session warning banner -->
      <div class="session-banner" id="sessionBanner" style="display:none">
        <span class="banner-icon">⏳</span>
        <span id="bannerText"></span>
        <button class="banner-extend" id="bannerExtend">ต่ออายุ</button>
        <button class="banner-close" id="bannerClose">✕</button>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="messageInput" placeholder="พิมพ์ข้อความถึงผู้ช่วย AI..." rows="1" disabled></textarea>
          <button id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <p class="input-hint" id="inputHint">เลือกผู้ช่วย AI เพื่อเริ่มการสนทนา</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
